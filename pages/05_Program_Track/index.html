<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCSI — Program Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@700&family=Space+Grotesk:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body data-slide="5" data-depth="1">
    <div class="glow-orb top-left"></div>
    <div class="glow-orb bottom-right"></div>

    <button class="nav-arrow nav-left" id="prevSlide" aria-label="Previous Slide">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <button class="nav-arrow nav-right" id="nextSlide" aria-label="Next Slide">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>

    <main class="slide-content">
        <div class="content-wrapper">
            <h2 class="history-title gradient-text" style="margin-bottom:2rem;">4-Year Program Track</h2>

            <div class="year-track">
                <div class="year-card">
                    <span class="year-label">Year 1</span>
                    <span class="year-cert">Tech+</span>
                </div>
                <div class="year-card">
                    <span class="year-label">Year 2</span>
                    <span class="year-cert">Network+</span>
                </div>
                <div class="year-card">
                    <span class="year-label">Year 3</span>
                    <span class="year-cert">Security+</span>
                </div>
                <div class="year-card" style="border-color: rgba(0,230,255,0.35);">
                    <span class="year-label" style="color:#00e6ff;">Year 4</span>
                    <span class="year-cert">Take Your Pick! <span style="font-size:1rem; color:rgba(255,255,255,0.6);">(Internship opportunities)</span></span>
                </div>
            </div>

            <p class="program-subtext">
                Supplemental Resources Used/Purchased: <strong>CertMaster Practice / Learn</strong> and <strong>Cisco Academy</strong>
            </p>

            <div class="accent-line"></div>
        </div>
    </main>

    <footer class="slide-footer">
        <div class="organization-info">
            <img src="../../pics/logo.png" alt="iCSI Logo" class="footer-logo">
            <p><i>The Institute of CyberSecurity and Innovation. (NorthEast ISD. San Antonio, TX)</i></p>
        </div>
        <div class="pagination-container">
            <ul class="pagination-list" id="jumpList"></ul>
        </div>
    </footer>

    <script src="../../js/script.js"></script>
</body>

</html>
