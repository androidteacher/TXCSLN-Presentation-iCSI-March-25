<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCSI — Solution Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@700&family=Space+Grotesk:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body data-slide="11" data-depth="1">
    <div class="glow-orb top-left"></div>
    <div class="glow-orb bottom-right"></div>

    <button class="nav-arrow nav-left" id="prevSlide" aria-label="Previous Slide">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <button class="nav-arrow nav-right" id="nextSlide" aria-label="Next Slide">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>

    <main class="slide-content">
        <div class="content-wrapper solution-guide-wrapper">
            <h2 class="solution-guide-title gradient-text">Every Activity Has a Solution Guide</h2>

            <img src="../../pics/docker/Solution_Guide.png"
                 alt="Solution Guide Example"
                 class="solution-guide-img">

            <ul class="notion-bullets">
                <li>
                    Solution guides are hosted on <strong>Notion</strong> —
                    <a href="https://humble-raptor-f30.notion.site/Har-Har-Hijack-The-Okta-Plunder-Dockerized-2f34c8e523768034b6bace15c572fbf1" target="_blank" class="notion-link">
                        Click here for an example
                    </a>
                </li>
            </ul>

            <div class="accent-line"></div>
        </div>
    </main>

    <footer class="slide-footer">
        <div class="organization-info">
            <img src="../../pics/logo.png" alt="iCSI Logo" class="footer-logo">
            <p><i>The Institute of CyberSecurity and Innovation. (NorthEast ISD. San Antonio, TX)</i></p>
        </div>
        <div class="pagination-container">
            <ul class="pagination-list" id="jumpList"></ul>
        </div>
    </footer>

    <script src="../../js/script.js"></script>

</html>
